<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 1px;
    }

    #reset:hover {
      background: #e94560;
      color: #fff;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
    .score-draw span { color: #888; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div class="score-item score-x">X <span id="scoreX">0</span></div>
    <div class="score-item score-draw">Draw <span id="scoreDraw">0</span></div>
    <div class="score-item score-o">O <span id="scoreO">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, score;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      score = score || { X: 0, O: 0, Draw: 0 };
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      document.getElementById('status').textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, draw: true };
      return null;
    }

    function updateScore() {
      document.getElementById('scoreX').textContent = score.X;
      document.getElementById('scoreO').textContent = score.O;
      document.getElementById('scoreDraw').textContent = score.Draw;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx =>
            document.querySelector(`[data-i="${idx}"]`).classList.add('win')
          );
          score[result.winner]++;
          document.getElementById('status').textContent = `${result.winner} wins!`;
        } else {
          score.Draw++;
          document.getElementById('status').textContent = "It's a draw!";
        }
        updateScore();
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = `${current}'s turn`;
      }
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
